services:
  backend:
    build: .
    container_name: qwen2api-backend
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
    shm_size: '256m'
    environment:
      - ADMIN_KEY=admin
      - PORT=7860
      - BROWSER_POOL_SIZE=3
      - MAX_INFLIGHT=1
      - PYTHONIOENCODING=utf-8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qwen2api-frontend
    restart: unless-stopped
    ports:
      - "7861:80"
    depends_on:
      backend:
        condition: service_healthy
